# netlify.toml
# ═══════════════════════════════════════════════════════════════
# JustFreeAI — Netlify Configuration
# ═══════════════════════════════════════════════════════════════

[build]
  publish = "."
  command = "node admin/build.js"
  functions = "netlify/functions"

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/tools/tools.json"
  [headers.values]
    Cache-Control = "public, max-age=300"   # 5 min cache — updates weekly
    Access-Control-Allow-Origin = "*"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Redirects
[[redirects]]
  from = "/tools"
  to = "/"
  status = 301

[[redirects]]
  from = "/submit"
  to = "/submit.html"
  status = 301
